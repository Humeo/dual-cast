<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4338ca"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.08)"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect x="48" y="48" width="416" height="416" rx="88" fill="url(#inner)" opacity="0.3"/>

  <!-- Left text block — original language (white, bolder) -->
  <g transform="translate(100, 140)">
    <rect x="0" y="0" width="170" height="16" rx="8" fill="white" opacity="0.95"/>
    <rect x="0" y="30" width="140" height="16" rx="8" fill="white" opacity="0.7"/>
    <rect x="0" y="60" width="155" height="16" rx="8" fill="white" opacity="0.7"/>
    <rect x="0" y="90" width="120" height="16" rx="8" fill="white" opacity="0.5"/>
  </g>

  <!-- Divider line -->
  <line x1="130" y1="290" x2="382" y2="290" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Right text block — translated language (lighter, offset) -->
  <g transform="translate(142, 310)">
    <rect x="0" y="0" width="200" height="14" rx="7" fill="rgba(196,181,253,0.8)"/>
    <rect x="0" y="26" width="160" height="14" rx="7" fill="rgba(196,181,253,0.55)"/>
    <rect x="0" y="52" width="180" height="14" rx="7" fill="rgba(196,181,253,0.55)"/>
  </g>

  <!-- Signal/broadcast arcs (top-right) — the "Cast" part -->
  <g transform="translate(340, 130)">
    <path d="M0 40a40 40 0 0 1 0-40" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="8" stroke-linecap="round"/>
    <path d="M12 32a56 56 0 0 1 0-56" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="7" stroke-linecap="round" transform="translate(12, -8)"/>
    <path d="M24 24a72 72 0 0 1 0-72" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="6" stroke-linecap="round" transform="translate(24, -16)"/>
  </g>
</svg>
